name: Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: slipwise-one
  ECS_CLUSTER: slipwise-cluster
  ECS_SERVICE_PROD: slipwise-prod
  ECS_SERVICE_STAGING: slipwise-staging
  ECS_TASK_DEFINITION_PROD: slipwise-task-prod
  ECS_TASK_DEFINITION_STAGING: slipwise-task-staging

permissions:
  contents: read
  id-token: write

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        run: |
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          SHA_SHORT=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME}
          TAG="${REGISTRY}/${ECR_REPOSITORY}:${BRANCH}-${SHA_SHORT}"
          echo "tags=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}-latest

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ github.ref_name == 'main' && secrets.PROD_DATABASE_URL || secrets.STAGING_DATABASE_URL }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-push, migrate]
    if: github.event_name == 'push'
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition (for rollback)
        id: current-task
        run: |
          SERVICE=${{ github.ref_name == 'main' && env.ECS_SERVICE_PROD || env.ECS_SERVICE_STAGING }}
          CURRENT_TASK=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${SERVICE} \
            --query 'services[0].taskDefinition' \
            --output text 2>/dev/null || echo "none")
          echo "task-def=${CURRENT_TASK}" >> "$GITHUB_OUTPUT"

      - name: Download task definition
        id: download-task-def
        run: |
          TASK_DEF=${{ github.ref_name == 'main' && env.ECS_TASK_DEFINITION_PROD || env.ECS_TASK_DEFINITION_STAGING }}
          aws ecs describe-task-definition \
            --task-definition ${TASK_DEF} \
            --query taskDefinition \
            > task-definition.json

      - name: Update container image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: slipwise-app
          image: ${{ needs.build-push.outputs.image-tag }}

      - name: Deploy to Amazon ECS
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ github.ref_name == 'main' && env.ECS_SERVICE_PROD || env.ECS_SERVICE_STAGING }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - name: Set app URL
        id: url
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "app_url=${{ secrets.PROD_APP_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "app_url=${{ secrets.STAGING_APP_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.app_url }}/api/health" || true)
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES failed (status: $RESPONSE). Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Verify app responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.app_url }}" || true)
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ App is responding (status: $STATUS)"
          else
            echo "❌ App returned unexpected status: $STATUS"
            exit 1
          fi

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: failure() && github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback ECS service
        run: |
          SERVICE=${{ github.ref_name == 'main' && env.ECS_SERVICE_PROD || env.ECS_SERVICE_STAGING }}
          echo "⚠️ Rolling back ${SERVICE}..."

          # Get the previous task definition revision
          CURRENT=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${SERVICE} \
            --query 'services[0].taskDefinition' \
            --output text)

          # Extract revision number and decrement
          REVISION=$(echo ${CURRENT} | grep -oP ':\K[0-9]+$')
          PREV_REVISION=$((REVISION - 1))
          TASK_FAMILY=$(echo ${CURRENT} | sed "s/:${REVISION}$/:${PREV_REVISION}/")

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${SERVICE} \
            --task-definition ${TASK_FAMILY} \
            --force-new-deployment

          echo "✅ Rollback initiated to ${TASK_FAMILY}"
