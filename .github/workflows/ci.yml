name: CI

on:
  push:
    branches:
      - master
      - "feature/**"
      - "codex/**"
  pull_request:

env:
  DATABASE_URL: "postgresql://test:test@localhost:5432/slipwise_test"
  BETTER_AUTH_SECRET: "ci-test-secret-for-build-validation-only-32ch"
  BETTER_AUTH_URL: "http://localhost:3000"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_PUBLIC_APP_NAME: "Slipwise One"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
