<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Slipwise sign-in code</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f4; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .wrapper { max-width: 560px; margin: 48px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .header { background: #dc2626; padding: 32px 40px; text-align: center; }
    .header h1 { margin: 0; color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .body { padding: 40px; }
    .body p { margin: 0 0 16px; color: #374151; font-size: 15px; line-height: 1.6; }
    .body p.muted { color: #9ca3af; font-size: 13px; }
    .otp-box { background: #fef2f2; border: 2px solid #dc2626; border-radius: 12px; padding: 20px; text-align: center; margin: 24px 0; }
    .otp-code { font-size: 40px; font-weight: 800; letter-spacing: 10px; color: #dc2626; font-variant-numeric: tabular-nums; }
    .otp-label { font-size: 12px; color: #9ca3af; margin-top: 6px; }
    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 24px 0; }
    .btn { display: inline-block; background: #dc2626; color: #ffffff !important; text-decoration: none; font-size: 15px; font-weight: 600; padding: 13px 32px; border-radius: 8px; }
    .footer { padding: 24px 40px; border-top: 1px solid #f3f4f6; }
    .footer p { margin: 0; color: #9ca3af; font-size: 12px; line-height: 1.6; }
    .footer a { color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Slipwise</h1>
    </div>
    <div class="body">
      <p>Hi there,</p>
      <p>Enter the code below to sign in to your Slipwise account:</p>
      <div class="otp-box">
        <div class="otp-code">{{ .Token }}</div>
        <div class="otp-label">Expires in 1 hour · Use once</div>
      </div>
      <hr class="divider" />
      <p style="text-align:center; color:#6b7280; font-size:13px;">Or click below to sign in without entering the code:</p>
      <div style="text-align:center; margin-top:12px;">
        <a href="{{ .ConfirmationURL }}" class="btn">Sign in to Slipwise</a>
      </div>
      <p class="muted" style="margin-top:24px;">If you didn't request this, you can safely ignore this email.</p>
    </div>
    <div class="footer">
      <p>© Slipwise · <a href="https://slipwise.app">slipwise.app</a></p>
    </div>
  </div>
</body>
</html>
